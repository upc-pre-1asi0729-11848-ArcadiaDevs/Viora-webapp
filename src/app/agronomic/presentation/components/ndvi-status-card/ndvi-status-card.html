<mat-card class="kpi-card">
  <h2>{{ 'cards.ndvi.title' | translate }}</h2>

  @if (store.latestAgronomicRecord(); as record) {
    <div class="metric-row">
      <strong>{{ record.ndviLabel }}</strong>
      <span>{{ record.ndviTrend === 'up' ? '↑' : record.ndviTrend === 'down' ? '↓' : '→' }}</span>
    </div>

    <span class="dark-pill">{{ record.ndviStatusLabel }}</span>

    <mat-progress-bar
      mode="determinate"
      [value]="ndviProgress()"
      style="--mdc-linear-progress-active-indicator-color: #2E4A3A; --mdc-linear-progress-track-color: #e0e0e0;">
    </mat-progress-bar>
  } @else {
    <div class="empty-state">{{ 'cards.ndvi.loading' | translate }}</div>
  }
</mat-card>
