<mat-card class="kpi-card">
  <h2>Overall Plot Health</h2>
  <p>Status</p>

  @if (store.monitoringSummary()?.overallPlotHealth; as health) {
    <span class="status-pill">{{ health.status }}</span>
    <div class="card-footer">
      {{ health.summaryLabel }}
    </div>
  } @else {
    <span class="status-pill muted">Loading</span>
    <div class="card-footer">Waiting for farm summary</div>
  }
</mat-card>
