<mat-card class="kpi-card">
  <h2>Yield Forecast</h2>

  @if (store.yieldForecast(); as forecast) {
    <strong class="main-value">{{ forecast.tonnesLabel }}</strong>
    <span class="risk-pill">{{ forecast.riskLevel }}</span>
    <p>{{ forecast.description }}</p>
  } @else {
    <div class="empty-state">Loading yield forecast</div>
  }
</mat-card>
