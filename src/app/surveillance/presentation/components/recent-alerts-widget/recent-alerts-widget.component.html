<mat-card class="shadow-none">
  <mat-card-header style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
    <mat-card-title>Alertas Recientes</mat-card-title>
    <button mat-icon-button>
      <mat-icon>arrow_forward</mat-icon>
    </button>
  </mat-card-header>

  <mat-card-content>
    <!-- Tabla básica con Material -->
    <table mat-table [dataSource]="alerts" style="width: 100%;">

      <!-- Columna: Tipo -->
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef> Tipo </th>
        <td mat-cell *matCellDef="let element" style="display: flex; align-items: center; gap: 8px;">
          <mat-icon color="primary">{{ getAlertIcon(element.type) }}</mat-icon>
          <div>
            <div style="font-weight: 500;">{{ element.type }}</div>
            <small style="color: gray;">{{ element.description }}</small>
          </div>
        </td>
      </ng-container>

      <!-- Columna: Lote -->
      <ng-container matColumnDef="plot">
        <th mat-header-cell *matHeaderCellDef> Lote </th>
        <td mat-cell *matCellDef="let element">
          <div style="font-weight: 500;">{{ element.plot.name }}</div>
          <small style="color: gray;">{{ element.plot.location }} &bull; {{ element.plot.hectares }}ha</small>
        </td>
      </ng-container>

      <!-- Columna: Severidad -->
      <ng-container matColumnDef="severity">
        <th mat-header-cell *matHeaderCellDef> Severidad </th>
        <td mat-cell *matCellDef="let element">
          <span [ngStyle]="getSeverityStyle(element.severity)">
            {{ element.severity }}
          </span>
        </td>
      </ng-container>

      <!-- Columna: Fecha -->
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef> Fecha </th>
        <td mat-cell *matCellDef="let element"> {{ element.date | date:'mediumDate' }} </td>
      </ng-container>

      <!-- Columna: Estado -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Estado </th>
        <td mat-cell *matCellDef="let element">
          <span [ngStyle]="getStatusStyle(element.status)">
            {{ element.status }}
          </span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card-content>
</mat-card>
