<aside class="recommended-card">
  <h2>{{ 'recommended.title' | translate }}</h2>

  <nav>
    @for (action of actions; track action.labelKey) {
      <a [routerLink]="action.route">
        <img [src]="action.iconPath" alt="" />
        <span>{{ action.labelKey | translate }}</span>
      </a>
    }
  </nav>
</aside>
